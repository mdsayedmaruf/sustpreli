# Render Blueprint — deploys the QueueStorm Investigator FastAPI service.
# In the Render dashboard: New + > Blueprint, point it at this repo.
services:
  - type: web
    name: queuestorm-investigator
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # The service is self-contained (no DB, no API key). CORS is the only knob.
      - key: CORS_ORIGINS
        value: "*"
